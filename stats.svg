<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 232" width="500" height="232" role="img" aria-label="Nachiket Palekar's GitHub stats">
<defs><style><![CDATA[
text{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace}
@keyframes fadeSlide{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes rankPulse{0%,100%{opacity:.85}50%{opacity:1}}
@keyframes shineX{0%{transform:translateX(-160px) skewX(-15deg)}60%,100%{transform:translateX(560px) skewX(-15deg)}}
.row{opacity:0;animation:fadeSlide .5s ease forwards}
.rk{animation:rankPulse 2.4s ease-in-out infinite}
.sh{animation:shineX 4.5s ease-in-out 2.4s infinite}
]]></style>
<linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%"><animate attributeName="stop-color" values="#38bdf8;#3b82f6;#38bdf8" dur="6s" repeatCount="indefinite"/></stop>
  <stop offset="100%"><animate attributeName="stop-color" values="#3b82f6;#38bdf8;#3b82f6" dur="6s" repeatCount="indefinite"/></stop>
</linearGradient>
<linearGradient id="ringg" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#1d4ed8"/>
</linearGradient>
<linearGradient id="shg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fff" stop-opacity="0"/><stop offset="50%" stop-color="#fff" stop-opacity=".07"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></linearGradient>
<clipPath id="cc"><rect x="1" y="1" width="498" height="230" rx="14"/></clipPath>
<filter id="g"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect x="1" y="1" width="498" height="230" rx="14" fill="#090e1a" stroke="url(#tg)" stroke-width="1.5"/>
<text x="24" y="38" font-size="16" font-weight="bold" fill="url(#tg)">💻 Nachiket Palekar's GitHub Stats</text>

  <!-- Stars -->
<g class="row" style="animation-delay:.5s">
    <text x="24" y="74" font-size="14">⭐</text>
    <text x="52" y="74" font-size="13.5" fill="#c9d1d9">Total Stars Earned:</text>
    <text x="316" y="74" text-anchor="end" font-size="14" font-weight="bold" fill="#fde047">1</text>
</g>

<!-- Commits -->
<g class="row" style="animation-delay:.7s">
    <text x="24" y="105" font-size="14">💻</text>
    <text x="52" y="105" font-size="13.5" fill="#c9d1d9">Total Commits:</text>
    <text x="316" y="105" text-anchor="end" font-size="14" font-weight="bold" fill="#7dd3fc">172</text>
</g>

<!-- PRs -->
<g class="row" style="animation-delay:.9s">
    <text x="24" y="136" font-size="14">🔀</text>
    <text x="52" y="136" font-size="13.5" fill="#c9d1d9">Total PRs:</text>
    <text x="316" y="136" text-anchor="end" font-size="14" font-weight="bold" fill="#4ade80">0</text>
</g>

<!-- Issues -->
<g class="row" style="animation-delay:1.1s">
    <text x="24" y="167" font-size="14">🐞</text>
    <text x="52" y="167" font-size="13.5" fill="#c9d1d9">Total Issues:</text>
    <text x="316" y="167" text-anchor="end" font-size="14" font-weight="bold" fill="#fb7185">0</text>
</g>

<!-- Contributions -->
<g class="row" style="animation-delay:1.3s">
    <text x="24" y="198" font-size="14">📅</text>
    <text x="52" y="198" font-size="13.5" fill="#c9d1d9">Contributed to (last year):</text>
    <text x="316" y="198" text-anchor="end" font-size="14" font-weight="bold" fill="#38bdf8">0</text>
</g>


<!-- Rank ring -->
<g transform="translate(408,138)">
  <circle r="52" fill="none" stroke="#0f172a" stroke-width="9"/>
  <circle r="52"
        fill="none"
        stroke="#a855f7"
        stroke-width="9"
        stroke-linecap="round"
        stroke-dasharray="18 326.7"
        stroke-dashoffset="0"
        transform="rotate(-90)">
    <animate attributeName="stroke-dashoffset" from="254.8" to="0" dur="1.6s" begin=".6s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
  </circle>
  <text class="rk"
      y="14"
      text-anchor="middle"
      font-size="40"
      font-weight="bold"
      fill="#7dd3fc"
      filter="url(#g)">C</text>
  <text y="76" text-anchor="middle" font-size="10.5" fill="#8b949e" opacity="0" style="animation:fadeIn .5s ease 1.8s forwards">RANK</text>
</g>

<g clip-path="url(#cc)"><rect class="sh" x="0" y="0" width="120" height="232" fill="url(#shg)"/></g>
</svg>