<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 420 282"
     width="420"
     height="282">

<style>
text{
font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;
}

@keyframes fade{
from{opacity:0;transform:translateY(6px)}
to{opacity:1;transform:translateY(0)}
}

.item{
opacity:0;
animation:fade .6s forwards;
}
</style>

<rect x="1" y="1"
      width="418"
      height="280"
      rx="14"
      fill="#0d1117"
      stroke="#3b82f6"
      stroke-width="1.5"/>

<text x="20"
      y="34"
      fill="#38bdf8"
      font-size="18"
      font-weight="bold">
📊 Top Languages
</text>

<!-- Stacked Bar -->

<rect x="20" y="58" width="97.6" height="12" fill="#7C3AED"/>
<rect x="117.6" y="58" width="83.3" height="12" fill="#F97316"/>
<rect x="200.9" y="58" width="75.9" height="12" fill="#DB5A9A"/>
<rect x="276.8" y="58" width="44.8" height="12" fill="#4F8CC9"/>
<rect x="321.6" y="58" width="40.5" height="12" fill="#FDE047"/>
<rect x="362.1" y="58" width="37.9" height="12" fill="#F55D2D"/>

<!-- Left Column -->

<g class="item" style="animation-delay:.4s">
<circle cx="28" cy="105" r="6" fill="#7C3AED"/>
<text x="42" y="110" fill="#e6edf3" font-size="14">CSS 25.68%</text>
</g>

<g class="item" style="animation-delay:.7s">
<circle cx="28" cy="145" r="6" fill="#F97316"/>
<text x="42" y="150" fill="#e6edf3" font-size="14">Jupyter Notebook 21.92%</text>
</g>

<g class="item" style="animation-delay:1s">
<circle cx="28" cy="185" r="6" fill="#DB5A9A"/>
<text x="42" y="190" fill="#e6edf3" font-size="14">SCSS 19.98%</text>
</g>

<!-- Right Column -->

<g class="item" style="animation-delay:1.3s">
<circle cx="235" cy="105" r="6" fill="#4F8CC9"/>
<text x="249" y="110" fill="#e6edf3" font-size="14">Python 11.80%</text>
</g>

<g class="item" style="animation-delay:1.6s">
<circle cx="235" cy="145" r="6" fill="#FDE047"/>
<text x="249" y="150" fill="#e6edf3" font-size="14">JavaScript 10.67%</text>
</g>

<g class="item" style="animation-delay:1.9s">
<circle cx="235" cy="185" r="6" fill="#F55D2D"/>
<text x="249" y="190" fill="#e6edf3" font-size="14">HTML 9.94%</text>
</g>

</svg>